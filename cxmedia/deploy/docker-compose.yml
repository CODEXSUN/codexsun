services:
  cxmedia:
    build:
      context: ../..
      dockerfile: cxmedia/deploy/Dockerfile
    container_name: cxmedia-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      CXMEDIA_NODE_ENV: production
      CXMEDIA_STRICT_CONFIG: "true"
      CXMEDIA_S3_ENDPOINT: http://127.0.0.1:3900
      CXMEDIA_S3_REGION: garage
      CXMEDIA_CDN_BASE_URL: ${CXMEDIA_PUBLIC_BASE_URL}
      CXMEDIA_CORS_ORIGINS: ${CXMEDIA_CORS_ORIGINS}
      CXMEDIA_THUMBOR_INTERNAL_BASE_URL: http://127.0.0.1:4188
      CXMEDIA_THUMBOR_SOURCE_BASE_URL: ${CXMEDIA_PUBLIC_BASE_URL}
    ports:
      - "4100:4100"
    volumes:
      - cxmedia_garage_meta:/var/lib/garage/meta
      - cxmedia_garage_data:/var/lib/garage/data
      - cxmedia_state:/app/cxmedia/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  cxmedia_garage_meta:
  cxmedia_garage_data:
  cxmedia_state:
