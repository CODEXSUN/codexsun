services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
    volumes:
      - orekso_qdrant_data:/qdrant/storage
    networks:
      - default
      - codexion-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - orekso_ollama_data:/root/.ollama
    networks:
      - default
      - codexion-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull llama3
        ollama pull nomic-embed-text
        wait

  orekso:
    build:
      context: ..
      dockerfile: .container/orekso-server.Dockerfile
    container_name: orekso
    restart: unless-stopped
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - CODEXSUN_API_URL=http://codexsun-app:4000
      - CODEXSUN_WORKSPACE_ROOT=/workspace
      - OREKSO_COLLECTION=codexsun_support
      - OREKSO_AUTO_INDEX=true
    volumes:
      - ..:/workspace:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
      - ollama
    networks:
      - default
      - codexion-network

volumes:
  orekso_qdrant_data:
  orekso_ollama_data:

networks:
  codexion-network:
    external: true
    name: codexion-network
  default:
    name: codexsun-orekso-internal
