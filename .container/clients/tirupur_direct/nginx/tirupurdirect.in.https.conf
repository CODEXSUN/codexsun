server {
    listen 80;
    listen [::]:80;
    server_name tirupurdirect.in www.tirupurdirect.in;

    return 301 https://tirupurdirect.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tirupurdirect.in;

    ssl_certificate /etc/letsencrypt/live/tirupurdirect.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tirupurdirect.in/privkey.pem;

    return 301 https://tirupurdirect.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tirupurdirect.in;

    ssl_certificate /etc/letsencrypt/live/tirupurdirect.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tirupurdirect.in/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
    }
}
