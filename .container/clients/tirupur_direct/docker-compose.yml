name: tirupur-direct

services:
  app:
    image: codexsun-app:v1
    pull_policy: never
    build:
      context: ../../..
      dockerfile: .container/Dockerfile
      args:
        VITE_FRONTEND_TARGET: shop
    container_name: tirupur-direct-app
    ports:
      - "4005:4000"
      - "5005:4000"
    restart: unless-stopped
    volumes:
      - tirupur_direct_runtime:/opt/codexsun/runtime
    networks:
      - codexion-network

volumes:
  tirupur_direct_runtime:

networks:
  codexion-network:
    external: true
    name: codexion-network
