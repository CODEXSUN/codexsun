name: neot-in

services:
  app:
    image: codexsun-app:v1
    pull_policy: never
    build:
      context: ../../..
      dockerfile: .container/Dockerfile
      args:
        VITE_FRONTEND_TARGET: shop
    container_name: neot-in-app
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:${APP_HTTP_HOST_PORT:-4002}:4000"
      - "${APP_BIND_IP:-0.0.0.0}:${APP_ALT_HTTP_HOST_PORT:-5002}:4000"
    restart: unless-stopped
    volumes:
      - neot_in_runtime:/opt/codexsun/runtime
    networks:
      - codexion-network

volumes:
  neot_in_runtime:

networks:
  codexion-network:
    external: true
    name: codexion-network
