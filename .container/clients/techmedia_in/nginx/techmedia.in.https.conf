server {
    listen 80;
    listen [::]:80;
    server_name techmedia.in www.techmedia.in;

    return 301 https://techmedia.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.techmedia.in;

    ssl_certificate /etc/letsencrypt/live/techmedia.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techmedia.in/privkey.pem;

    return 301 https://techmedia.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name techmedia.in;

    ssl_certificate /etc/letsencrypt/live/techmedia.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techmedia.in/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
    }
}
