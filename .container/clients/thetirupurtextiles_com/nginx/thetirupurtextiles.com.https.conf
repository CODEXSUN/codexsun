server {
    listen 80;
    listen [::]:80;
    server_name thetirupurtextiles.com www.thetirupurtextiles.com;

    return 301 https://thetirupurtextiles.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.thetirupurtextiles.com;

    ssl_certificate /etc/letsencrypt/live/thetirupurtextiles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thetirupurtextiles.com/privkey.pem;

    return 301 https://thetirupurtextiles.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thetirupurtextiles.com;

    ssl_certificate /etc/letsencrypt/live/thetirupurtextiles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thetirupurtextiles.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4014;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
