server {
    listen 80;
    listen [::]:80;
    server_name horseclub.in www.horseclub.in;

    return 301 https://horseclub.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.horseclub.in;

    ssl_certificate /etc/letsencrypt/live/horseclub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horseclub.in/privkey.pem;

    return 301 https://horseclub.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name horseclub.in;

    ssl_certificate /etc/letsencrypt/live/horseclub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horseclub.in/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
